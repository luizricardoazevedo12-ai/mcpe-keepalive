name: Bot 24h MagmaNode
on:
  schedule:
    - cron: '*/9 * * * *'
  workflow_dispatch:
jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - run: npm install bedrock-protocol
      - run: node -e "const {Client}=require('bedrock-protocol');const c=new Client({host:'dynamic-10.magmanode.com',port:25768,username:'Bot24H',offline:true});c.on('spawn',()=>{console.log('Bot24H entrou');setTimeout(()=>{c.disconnect();process.exit(0)},30000)});c.on('error',e=>{process.exit(0)});setTimeout(()=>process.exit(0),45000);"
